name: Deploy RoutineWeave

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  SAM_STACK_NAME: routineweave-${{ github.event.inputs.environment || 'production' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
  NODE_VERSION: "20"

jobs:
  # ─── Quality Gates ─────────────────────────────────────────────────────────
  quality:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: routineweave-build
          path: |
            dist/
            tasks/
            node_modules/
            package.json
          retention-days: 1

  # ─── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS (${{ github.event.inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: routineweave-build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: routineweave-deploy-${{ github.run_id }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build
        timeout-minutes: 5
        run: sam build --template aws/template.yaml

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Environment=${{ env.ENVIRONMENT }} \
              LogLevel=info \
            --tags \
              Project=RoutineWeave \
              Environment=${{ env.ENVIRONMENT }} \
              DeployedBy=github-actions \
              CommitSha=${{ github.sha }}

      - name: Output stack info
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs" \
            --output table
