AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: RoutineWeave - AI-powered scheduled execution engine

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

  LogLevel:
    Type: String
    Default: info
    AllowedValues: [debug, info, warn, error]

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    MemorySize: 256
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        LOG_LEVEL: !Ref LogLevel
        AWS_REGION_NAME: !Ref AWS::Region
        SNS_TOPIC_ARN: !Ref RoutineWeaveNotificationTopic
        TASKS_BUCKET: !Ref TasksBucket
        TASKS_S3_PREFIX: "tasks/"
        RESULTS_BUCKET: !Ref ResultsBucket

Resources:
  # ─── S3 Bucket (task store) ───────────────────────────────────────────────────
  # EventBridgeEnabled: true routes all S3 events to the default event bus,
  # where the S3TaskChangeRule below filters to tasks/*.json changes only.
  TasksBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "routineweave-tasks-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: RoutineWeave
        - Key: Environment
          Value: !Ref Environment

  # ─── Results Bucket ──────────────────────────────────────────────────────────
  # DeletionPolicy: Retain — bucket and contents survive stack deletion.
  ResultsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "routineweave-results-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: RoutineWeave
        - Key: Environment
          Value: !Ref Environment

  # ─── SNS Topic + Email Subscription ──────────────────────────────────────────
  RoutineWeaveNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "routineweave-notifications-${Environment}"
      DisplayName: RoutineWeave Notifications

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref RoutineWeaveNotificationTopic
      Protocol: email
      Endpoint: rajatarun12@gmail.com

  # ─── Shared IAM Role ──────────────────────────────────────────────────────────
  RoutineWeaveLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "routineweave-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RoutineWeavePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt TasksBucket.Arn
                  - !Sub "${TasksBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ResultsBucket.Arn
                  - !Sub "${ResultsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - sns:Publish
                  - sns:Subscribe
                Resource: !Ref RoutineWeaveNotificationTopic
              - Effect: Allow
                Action:
                  - events:PutRule
                  - events:PutTargets
                  - events:DeleteRule
                  - events:RemoveTargets
                  - events:DescribeRule
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/routineweave-task-*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/routineweave-*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:Converse
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-2-lite-v1:0"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:gemini/api_key*"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/routineweave/*"

  # ─── Scheduler Lambda ─────────────────────────────────────────────────────────
  # No longer has a generic hourly trigger — each task gets its own
  # per-task EventBridge rule created by the Registrar Lambda.
  RoutineWeaveSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "routineweave-scheduler-${Environment}"
      Handler: dist/lambda.handler
      CodeUri: ../
      Role: !GetAtt RoutineWeaveLambdaRole.Arn
      Timeout: 300
      Description: Runs a specific Gemini task and publishes result to SNS
      ReservedConcurrentExecutions: 10
      Tags:
        Project: RoutineWeave
        Environment: !Ref Environment

  # Allow any EventBridge rule matching routineweave-task-* to invoke the scheduler
  SchedulerCronPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RoutineWeaveSchedulerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/routineweave-task-*"

  # ─── Registrar Lambda ─────────────────────────────────────────────────────────
  # Triggered by S3 Object Created/Deleted events (EventBridge 1).
  # Creates or deletes a per-task EventBridge cron rule (EventBridge 2).
  RoutineWeaveRegistrarFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "routineweave-registrar-${Environment}"
      Handler: dist/registrar.handler
      CodeUri: ../
      Role: !GetAtt RoutineWeaveLambdaRole.Arn
      Timeout: 30
      Description: Manages per-task EventBridge cron rules in response to S3 task changes
      Environment:
        Variables:
          SCHEDULER_LAMBDA_ARN: !GetAtt RoutineWeaveSchedulerFunction.Arn
      Tags:
        Project: RoutineWeave
        Environment: !Ref Environment

  # Allow the S3TaskChangeRule to invoke the Registrar
  RegistrarInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RoutineWeaveRegistrarFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt S3TaskChangeRule.Arn

  # ─── EventBridge 1: S3 task changes → Registrar ───────────────────────────────
  # Matches Object Created / Object Deleted on the tasks/ prefix.
  S3TaskChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "routineweave-s3-task-change-${Environment}"
      Description: Fires when a task JSON is created or deleted in the S3 task store
      State: ENABLED
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
          - Object Deleted
        detail:
          bucket:
            name:
              - !Ref TasksBucket
          object:
            key:
              - prefix: "tasks/"
      Targets:
        - Id: RegistrarTarget
          Arn: !GetAtt RoutineWeaveRegistrarFunction.Arn

  # ─── API Lambda ───────────────────────────────────────────────────────────────
  RoutineWeaveApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "routineweave-api-${Environment}"
      Handler: dist/api.handler
      CodeUri: ../
      Role: !GetAtt RoutineWeaveLambdaRole.Arn
      Timeout: 30
      Description: HTTP API for managing RoutineWeave task definitions in S3
      Events:
        ListTasks:
          Type: HttpApi
          Properties:
            Path: /tasks
            Method: GET
            ApiId: !Ref RoutineWeaveHttpApi
        CreateTask:
          Type: HttpApi
          Properties:
            Path: /tasks
            Method: POST
            ApiId: !Ref RoutineWeaveHttpApi
        GetTask:
          Type: HttpApi
          Properties:
            Path: /tasks/{taskName}
            Method: GET
            ApiId: !Ref RoutineWeaveHttpApi
        UpdateTask:
          Type: HttpApi
          Properties:
            Path: /tasks/{taskName}
            Method: PUT
            ApiId: !Ref RoutineWeaveHttpApi
        DeleteTask:
          Type: HttpApi
          Properties:
            Path: /tasks/{taskName}
            Method: DELETE
            ApiId: !Ref RoutineWeaveHttpApi
        ListResults:
          Type: HttpApi
          Properties:
            Path: /results/{taskName}
            Method: GET
            ApiId: !Ref RoutineWeaveHttpApi
        GetResult:
          Type: HttpApi
          Properties:
            Path: /results/{taskName}/{date}/{filename}
            Method: GET
            ApiId: !Ref RoutineWeaveHttpApi
      Tags:
        Project: RoutineWeave
        Environment: !Ref Environment

  # ─── HTTP API (API Gateway v2) ────────────────────────────────────────────────
  RoutineWeaveHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: RoutineWeave task management API
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Amz-Date
          - X-Api-Key
          - X-Amz-Security-Token
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 86400
      Tags:
        Project: RoutineWeave
        Environment: !Ref Environment

  # ─── CloudWatch Log Groups ────────────────────────────────────────────────────
  SchedulerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/routineweave-scheduler-${Environment}"
      RetentionInDays: 30

  RegistrarLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/routineweave-registrar-${Environment}"
      RetentionInDays: 30

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/routineweave-api-${Environment}"
      RetentionInDays: 30

  # ─── CloudWatch Alarm ─────────────────────────────────────────────────────────
  RoutineWeaveErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "routineweave-errors-${Environment}"
      AlarmDescription: Alert when RoutineWeave scheduler errors exceed threshold
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref RoutineWeaveSchedulerFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref RoutineWeaveNotificationTopic
      TreatMissingData: notBreaching

Outputs:
  TasksBucketName:
    Description: S3 bucket for task definitions
    Value: !Ref TasksBucket
    Export:
      Name: !Sub "${AWS::StackName}-TasksBucket"

  ApiUrl:
    Description: HTTP API base URL
    Value: !Sub "https://${RoutineWeaveHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"

  SchedulerFunctionArn:
    Description: Scheduler Lambda ARN
    Value: !GetAtt RoutineWeaveSchedulerFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SchedulerArn"

  RegistrarFunctionArn:
    Description: Registrar Lambda ARN
    Value: !GetAtt RoutineWeaveRegistrarFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RegistrarArn"

  SnsTopicArn:
    Description: SNS topic ARN for notifications
    Value: !Ref RoutineWeaveNotificationTopic
    Export:
      Name: !Sub "${AWS::StackName}-SnsTopicArn"

  ResultsBucketName:
    Description: S3 bucket for task execution results
    Value: !Ref ResultsBucket
    Export:
      Name: !Sub "${AWS::StackName}-ResultsBucket"
