AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: RoutineWeave - AI-powered scheduled execution engine

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

  LogLevel:
    Type: String
    Default: info
    AllowedValues: [debug, info, warn, error]

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    MemorySize: 256
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        LOG_LEVEL: !Ref LogLevel
        AWS_REGION_NAME: !Ref AWS::Region
        SNS_TOPIC_ARN: !Ref RoutineWeaveNotificationTopic
        TASKS_BUCKET: !Ref TasksBucket
        TASKS_S3_PREFIX: "tasks/"

Resources:
  # ─── S3 Bucket (task store) ───────────────────────────────────────────────────
  TasksBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "routineweave-tasks-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: RoutineWeave
        - Key: Environment
          Value: !Ref Environment

  # ─── SNS Topic + Email Subscription ──────────────────────────────────────────
  RoutineWeaveNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "routineweave-notifications-${Environment}"
      DisplayName: RoutineWeave Notifications

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref RoutineWeaveNotificationTopic
      Protocol: email
      Endpoint: rajatarun12@gmail.com

  # ─── Shared IAM Role ──────────────────────────────────────────────────────────
  RoutineWeaveLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "routineweave-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RoutineWeavePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt TasksBucket.Arn
                  - !Sub "${TasksBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - sns:Publish
                  - sns:Subscribe
                Resource: !Ref RoutineWeaveNotificationTopic
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/routineweave-*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:gemini/api_key*"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/routineweave/*"

  # ─── Scheduler Lambda ─────────────────────────────────────────────────────────
  RoutineWeaveSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "routineweave-scheduler-${Environment}"
      Handler: dist/lambda.handler
      CodeUri: ../
      Role: !GetAtt RoutineWeaveLambdaRole.Arn
      Timeout: 300
      Description: Loads tasks from S3, runs Gemini prompts, publishes results to SNS
      ReservedConcurrentExecutions: 5
      Events:
        HourlyTrigger:
          Type: Schedule
          Properties:
            Schedule: "rate(1 hour)"
            Name: !Sub "routineweave-hourly-${Environment}"
            Description: Hourly EventBridge trigger for RoutineWeave scheduler
            Enabled: true
            Input: '{"source": "aws.events", "detail-type": "Scheduled Event"}'
      Tags:
        Project: RoutineWeave
        Environment: !Ref Environment

  # ─── API Lambda ───────────────────────────────────────────────────────────────
  RoutineWeaveApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "routineweave-api-${Environment}"
      Handler: dist/api.handler
      CodeUri: ../
      Role: !GetAtt RoutineWeaveLambdaRole.Arn
      Timeout: 30
      Description: HTTP API for managing RoutineWeave task definitions in S3
      Events:
        ListTasks:
          Type: HttpApi
          Properties:
            Path: /tasks
            Method: GET
            ApiId: !Ref RoutineWeaveHttpApi
        CreateTask:
          Type: HttpApi
          Properties:
            Path: /tasks
            Method: POST
            ApiId: !Ref RoutineWeaveHttpApi
        GetTask:
          Type: HttpApi
          Properties:
            Path: /tasks/{taskName}
            Method: GET
            ApiId: !Ref RoutineWeaveHttpApi
        UpdateTask:
          Type: HttpApi
          Properties:
            Path: /tasks/{taskName}
            Method: PUT
            ApiId: !Ref RoutineWeaveHttpApi
        DeleteTask:
          Type: HttpApi
          Properties:
            Path: /tasks/{taskName}
            Method: DELETE
            ApiId: !Ref RoutineWeaveHttpApi
      Tags:
        Project: RoutineWeave
        Environment: !Ref Environment

  # ─── HTTP API (API Gateway v2) ────────────────────────────────────────────────
  RoutineWeaveHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: RoutineWeave task management API
      Tags:
        Project: RoutineWeave
        Environment: !Ref Environment

  # ─── CloudWatch Log Groups ────────────────────────────────────────────────────
  SchedulerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/routineweave-scheduler-${Environment}"
      RetentionInDays: 30

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/routineweave-api-${Environment}"
      RetentionInDays: 30

  # ─── CloudWatch Alarm ─────────────────────────────────────────────────────────
  RoutineWeaveErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "routineweave-errors-${Environment}"
      AlarmDescription: Alert when RoutineWeave Lambda errors exceed threshold
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref RoutineWeaveSchedulerFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref RoutineWeaveNotificationTopic
      TreatMissingData: notBreaching

Outputs:
  TasksBucketName:
    Description: S3 bucket for task definitions
    Value: !Ref TasksBucket
    Export:
      Name: !Sub "${AWS::StackName}-TasksBucket"

  ApiUrl:
    Description: HTTP API base URL
    Value: !Sub "https://${RoutineWeaveHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"

  SchedulerFunctionArn:
    Description: Scheduler Lambda ARN
    Value: !GetAtt RoutineWeaveSchedulerFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SchedulerArn"

  SnsTopicArn:
    Description: SNS topic ARN for notifications
    Value: !Ref RoutineWeaveNotificationTopic
    Export:
      Name: !Sub "${AWS::StackName}-SnsTopicArn"
