AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: RoutineWeave - AI-powered scheduled execution engine

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: Google Gemini API key (store in SSM Parameter Store in production)

  SnsTopicArn:
    Type: String
    Description: ARN of the SNS topic for notifications

  LogLevel:
    Type: String
    Default: info
    AllowedValues: [debug, info, warn, error]

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 300
    MemorySize: 256
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        LOG_LEVEL: !Ref LogLevel
        AWS_REGION_NAME: !Ref AWS::Region
        SNS_TOPIC_ARN: !Ref SnsTopicArn
        GEMINI_API_KEY: !Ref GeminiApiKey
        TASKS_DIR: /var/task/tasks

Resources:
  # ─── SNS Topic ────────────────────────────────────────────────────────────────
  RoutineWeaveNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "routineweave-notifications-${Environment}"
      DisplayName: RoutineWeave Notifications

  # ─── IAM Role ─────────────────────────────────────────────────────────────────
  RoutineWeaveLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "routineweave-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RoutineWeavePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                  - sns:Subscribe
                Resource: !Ref SnsTopicArn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/routineweave-*"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/routineweave/*"

  # ─── Lambda Function ──────────────────────────────────────────────────────────
  RoutineWeaveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "routineweave-scheduler-${Environment}"
      Handler: dist/lambda.handler
      CodeUri: ../
      Role: !GetAtt RoutineWeaveLambdaRole.Arn
      Description: RoutineWeave AI-powered scheduled task executor
      ReservedConcurrentExecutions: 5
      Events:
        # Trigger every hour to check and run due tasks
        HourlyTrigger:
          Type: Schedule
          Properties:
            Schedule: "rate(1 hour)"
            Name: !Sub "routineweave-hourly-${Environment}"
            Description: Hourly trigger for RoutineWeave task scheduler
            Enabled: true
            Input: '{"source": "aws.events", "detail-type": "Scheduled Event"}'
      Tags:
        Project: RoutineWeave
        Environment: !Ref Environment

  # ─── CloudWatch Log Group ─────────────────────────────────────────────────────
  RoutineWeaveLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/routineweave-scheduler-${Environment}"
      RetentionInDays: 30

  # ─── CloudWatch Alarms ────────────────────────────────────────────────────────
  RoutineWeaveErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "routineweave-errors-${Environment}"
      AlarmDescription: Alert when RoutineWeave Lambda errors exceed threshold
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref RoutineWeaveFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref RoutineWeaveNotificationTopic
      TreatMissingData: notBreaching

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt RoutineWeaveFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaArn"

  SnsTopicArn:
    Description: SNS topic ARN for notifications
    Value: !Ref RoutineWeaveNotificationTopic
    Export:
      Name: !Sub "${AWS::StackName}-SnsTopicArn"

  LogGroupName:
    Description: CloudWatch log group name
    Value: !Ref RoutineWeaveLogGroup
